<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>agent-change-reviewer — edit pending</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --fg: #e6edf3; --muted: #8d96a0; --accent: #4493f8;
    --green: #238636; --red: #da3633;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; min-height: 100vh; align-items: center; justify-content: center;
  }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .card {
    width: min(560px, calc(100vw - 32px)); background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px;
  }
  h1 { font-size: 16px; margin: 0 0 2px; }
  .meta { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .stat-add { color: #3fb950; }
  .stat-del { color: #f85149; }
  .choice {
    display: flex; align-items: center; gap: 12px; width: 100%;
    text-align: left; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; margin: 8px 0; cursor: pointer; font: inherit;
  }
  .choice:hover { border-color: var(--accent); }
  .choice .key {
    flex: none; width: 22px; height: 22px; line-height: 20px; text-align: center;
    border: 1px solid var(--border); border-radius: 5px;
    color: var(--muted); font-size: 12px;
  }
  .choice .label { font-weight: 600; }
  .choice .hint { color: var(--muted); font-size: 12px; }
  .choice.accept .label { color: #3fb950; }
  .choice.reject .label { color: #f85149; }
  #reject-form { display: none; margin-top: 10px; }
  #reject-form textarea {
    width: 100%; min-height: 64px; background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; padding: 8px;
    font: inherit; resize: vertical;
  }
  #reject-form .row { margin-top: 8px; display: flex; gap: 8px; }
  button.btn {
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px;
    background: #21262d; color: var(--fg); cursor: pointer; font-size: 13px;
  }
  button.btn.danger { background: var(--red); border-color: transparent; color: #fff; }
  button:disabled { opacity: .5; cursor: default; }
  #done { text-align: center; padding: 40px 10px; }
  #done .big { font-size: 44px; }
  #done p { color: var(--muted); }
</style>
</head>
<body>
<div class="card" id="card">Loading…</div>
<script>
"use strict";

const state = { data: null, busy: false };

function el(tag, attrs = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") node.className = v;
    else if (k.startsWith("on")) node[k] = v;
    else node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c == null) continue;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}

function stats(files) {
  let add = 0, del = 0;
  for (const f of files) for (const h of f.hunks) for (const l of h.lines) {
    if (l.type === "add") add++;
    else if (l.type === "del") del++;
  }
  return { add, del };
}

async function init() {
  let data;
  try {
    data = await (await fetch("/api/session")).json();
  } catch (e) {
    showDone("⚠️", "Server gone", "This edit was already decided or timed out — go back to the agent.");
    return;
  }
  state.data = data;
  document.title = "agent-change-reviewer — " + data.request.title;
  render();
}

function choice(key, cls, label, hint, onpick) {
  return el("button", { class: "choice " + cls, onclick: onpick }, [
    el("span", { class: "key" }, key),
    el("span", {}, [el("div", { class: "label" }, label), el("div", { class: "hint" }, hint)]),
  ]);
}

function agentName() {
  const meta = state.data.request.meta || {};
  return meta.tool === "apply_patch" ? "Codex" : "Claude";
}

function render() {
  const { request, files } = state.data;
  const s = stats(files);
  const meta = request.meta || {};
  const card = document.getElementById("card");
  card.textContent = "";

  card.appendChild(el("h1", {}, agentName() + " wants to edit " + (files.length === 1 ? "a file" : files.length + " files")));
  card.appendChild(el("div", { class: "meta" }, [
    el("span", { class: "mono" }, (meta.tool || "Edit") + " " + (meta.file || "")),
    " · ",
    el("span", { class: "stat-add" }, "+" + s.add),
    " ",
    el("span", { class: "stat-del" }, "−" + s.del),
  ]));

  card.appendChild(choice("1", "accept", "Allow", "apply this edit", () => decide("accept")));
  card.appendChild(choice("2", "accept", "Allow all edits this session",
    "stop asking until this agent session ends", () => decide("accept_session")));
  card.appendChild(choice("3", "", "Review", "open the inline diff, comment line by line",
    () => { location.href = "/review"; }));
  card.appendChild(choice("4", "reject", "Reject…", "block the edit, optionally tell the agent why", toggleReject));

  const ta = el("textarea", { id: "reject-reason", placeholder: "Tell the agent what to do instead (optional)…" });
  ta.onkeydown = (e) => { if ((e.metaKey || e.ctrlKey) && e.key === "Enter") decide("reject"); };
  card.appendChild(el("div", { id: "reject-form" }, [
    ta,
    el("div", { class: "row" }, [
      el("button", { class: "btn danger", onclick: () => decide("reject") }, "Reject edit"),
      el("button", { class: "btn", onclick: toggleReject }, "Cancel"),
    ]),
  ]));

  document.onkeydown = (e) => {
    if (state.busy || e.target.tagName === "TEXTAREA") return;
    if (e.key === "1") decide("accept");
    else if (e.key === "2") decide("accept_session");
    else if (e.key === "3") location.href = "/review";
    else if (e.key === "4") toggleReject();
  };
}

function toggleReject() {
  const form = document.getElementById("reject-form");
  const show = form.style.display !== "block";
  form.style.display = show ? "block" : "none";
  if (show) document.getElementById("reject-reason").focus();
}

async function decide(action) {
  if (state.busy) return;
  state.busy = true;
  document.querySelectorAll("button").forEach((b) => (b.disabled = true));
  const reason = action === "reject" ? document.getElementById("reject-reason").value.trim() : "";
  try {
    const res = await fetch("/api/decision", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ action, reason }),
    });
    if (!res.ok) {
      let msg = res.statusText;
      try { msg = (await res.json()).error || msg; } catch (e) { /* not json */ }
      throw new Error(msg);
    }
  } catch (e) {
    alert("Failed to send the decision: " + e.message);
    state.busy = false;
    document.querySelectorAll("button").forEach((b) => (b.disabled = false));
    return;
  }
  const a = agentName();
  const texts = {
    accept: ["✅", "Edit allowed", a + " is applying the edit. You can close this tab."],
    accept_session: ["✅", "Edits allowed for this session", a + " won't ask again until this session ends. You can close this tab."],
    reject: ["⛔", "Edit rejected", a + " was told not to apply it. You can close this tab."],
  };
  showDone(...texts[action]);
}

function showDone(big, title, sub) {
  document.onkeydown = null;
  const card = document.getElementById("card");
  card.textContent = "";
  card.appendChild(el("div", { id: "done" }, [
    el("div", { class: "big" }, big),
    el("h2", {}, title),
    el("p", {}, sub),
  ]));
}

init();
</script>
</body>
</html>
